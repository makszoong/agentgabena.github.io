<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Fansite</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: url('bg.png') no-repeat center center fixed;
        background-size: cover;
        color: white;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        padding: 40px 10px;
    }

    .section {
        width: 90%;
        max-width: 1100px;
        background: rgba(15, 15, 15, 0.85);
        border: 1px solid #edb65c;
        border-radius: 12px;
        padding: 20px;
        backdrop-filter: blur(8px);
    }

    .section-header {
        text-align: center;
        margin-bottom: 20px;
        border-bottom: 1px solid rgba(237, 182, 92, 0.3);
        padding-bottom: 15px;
    }

    .section-header img {
        height: 120px;
        object-fit: contain;
    }

    h2 {
        color: #edb65c;
        margin: 0;
        text-transform: uppercase;
    }

    .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
    }

    .card {
        flex: 0 1 300px;
        background: rgba(40, 40, 40, 0.9);
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #444;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        border-color: #edb65c;
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .card-text {
        padding: 12px;
        text-align: center;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">

    <section class="section">
        <div class="section-header">
            <img src="logo.png" alt="Logo PNG"> </div>
        <div class="gallery">
            <div class="card">
                <img src="hero1.png" alt="Герой 1">
            </div>

            <div class="card">
            <img src="hero2.png" alt="Герой 2">
        </div>
            </div>
    </section>

    <section class="section">
        <div class="section-header">
            <h2>Агенти Габена не витримали</h2>
        </div>
        <div class="gallery">
            <div class="card">
                <img src="pic2.jpg" alt="Картинка 2">
                <div class="card-text">Агент №1</div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="section-header">
            <h2>Легенди дедлока</h2>
        </div>
        <div class="gallery">
            <div class="card">
                <img src="pic3.jpg" alt="Картинка 3">
                <div class="card-text">Легенда №1</div>
            </div>
        </div>
    </section>

</div>

</body>
</html>
