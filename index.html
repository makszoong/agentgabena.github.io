<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Legends | Агенти Габена</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        .main-header {
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid #edb65c;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-photo {
            height: 60px;
            width: auto;
            display: block;
            transition: transform 0.2s;
        }

        .header-photo:hover {
            transform: scale(1.05);
        }

        .header-nav {
            display: flex;
            gap: 25px;
        }

        .header-nav a {
            color: #edb65c;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            transition: 0.3s;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
        }

        .header-nav a:hover {
            color: white;
            border-bottom: 2px solid #edb65c;
            text-shadow: 0 0 10px rgba(237, 182, 92, 0.6);
        }

        /* ОСНОВНЫЕ СТИЛИ СТРАНИЦЫ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            padding: 50px 20px;
            padding-top: 140px;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            min-height: 100vh;
        }

        .section {
            position: relative;
            width: 100%;
            max-width: 720px;
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid #edb65c;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            scroll-margin-top: 120px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(237, 182, 92, 0.3);
            padding-bottom: 15px;
        }

        .section-header img {
            max-height: 80px;
            object-fit: contain;
        }

        h2 {
            margin: 0;
            color: #edb65c;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.6rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .hero-strip {
            width: 652px;
            height: 42px;
            display: block;
            object-fit: fill;
            border: 1px solid #333;
            border-radius: 4px;
            transition: all 0.2s ease-in-out;
            position: relative;
            z-index: 5;
        }

        .hero-strip:hover {
            transform: scale(1.03);
            border-color: #edb65c;
            box-shadow: 0 0 15px rgba(237, 182, 92, 0.4);
            cursor: pointer;
        }

        .legend-frame {
            max-width: 950px;
            padding: 100px 120px !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .legend-frame::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -35px;
            right: -35px;
            bottom: -10px;
            background: url('fire_frame.png') no-repeat;
            background-size: 100% 100%;
            pointer-events: none;
            z-index: 10;
        }

        .legend-frame .hero-strip {
            width: 100%;
            max-width: 652px;
            position: relative;
            z-index: 11;
        }
        
        @media (max-width: 700px) {
            .hero-strip {
                width: 100%;
                height: auto;
            }
            .header-nav {
                gap: 10px;
            }
            .header-nav a {
                font-size: 0.7rem;
            }
            .legend-frame {
                padding: 60px 40px !important;
            }
            .legend-frame::before {
                left: -10px;
                right: -10px;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <a href="#home" class="logo-link">
                <img src="logosite.png" alt="Агенти Габена" class="header-photo">
            </a>
            
            <nav class="header-nav">
                <a href="#home">Головна</a>
                <a href="#agents">Агенти</a>
                <a href="#legends">Легенди</a>
            </nav>
        </div>
    </header>

    <div class="container">
        
        <section class="section" id="home">
            <div class="section-header">
                <img src="logo.png" alt="Logo Main"> 
            </div>
            <div class="gallery">
                <img src="hero1.png" alt="Hero 1" class="hero-strip">
                <img src="hero2.png" alt="Hero 2" class="hero-strip">
                <img src="hero3.png" alt="Hero 3" class="hero-strip">
                <img src="hero4.png" alt="Hero 4" class="hero-strip">
                <img src="hero5.png" alt="Hero 5" class="hero-strip">
                <img src="hero6.png" alt="Hero 6" class="hero-strip">
                <img src="hero7.png" alt="Hero 7" class="hero-strip">
                <img src="hero8.png" alt="Hero 8" class="hero-strip">
                <img src="hero9.png" alt="Hero 9" class="hero-strip">
                <img src="hero10.png" alt="Hero 10" class="hero-strip">
            </div>
        </section>

        <section class="section" id="agents">
            <div class="section-header">
                <h2>Агенти Габена які не витримали</h2>
            </div>
            <div class="gallery">
                <img src="agent1.png" alt="Agent 1" class="hero-strip">
                <img src="agent2.png" alt="Agent 2" class="hero-strip">
            </div>
        </section>

        <section class="section legend-frame" id="legends">
            <div class="section-header">
                <h2>Легенди дедлока</h2>
            </div>
            <div class="gallery">
                <img src="legend1.png" alt="Legend 1" class="hero-strip">
                <img src="legend2.png" alt="Legend 2" class="hero-strip">
                <img src="legend3.png" alt="Legend 3" class="hero-strip">
            </div>
        </section>

    </div>

</body>
</html>
